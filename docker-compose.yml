services:
  postgres:
    image: postgres:15-alpine
    container_name: ibiomedica_db
    environment:
      POSTGRES_DB: ibiomedica_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      # Solo localhost: nunca exponer la BD a internet (Docker bypassa ufw).
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ibiomedica_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Storage S3-compatible (fotos de productos, PDFs, certificados AFIP cifrados)
  minio:
    image: minio/minio:latest
    container_name: ibiomedica_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    ports:
      # Solo localhost: MinIO API + consola no deben verse desde internet.
      - "127.0.0.1:9000:9000"   # API S3
      - "127.0.0.1:9001:9001"   # Consola web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cola de trabajos para el worker (AFIP, mail, recordatorios) — Fase 4+
  redis:
    image: redis:7-alpine
    container_name: ibiomedica_redis
    ports:
      # Solo localhost: Redis sin auth no debe verse desde internet.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  n8n:
    image: n8nio/n8n:latest
    container_name: ibiomedica_n8n
    ports:
      # Solo localhost: n8n se accede vía Caddy/localhost, no directo desde internet.
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  minio_data:
  redis_data:
