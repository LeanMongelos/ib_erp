name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/ibiomedica
            git fetch origin
            git reset --hard origin/master
            # integridad:prod corre dentro de vps-deploy-from-git.sh (requiere BD prod; no en GitHub Actions)
            bash scripts/vps-deploy-from-git.sh

      # Verifica que la app responda tras el deploy. Requiere que Caddy exponga /api/health
      # públicamente. Si el firewall bloquea IPs de GitHub Actions, comentar este paso y
      # monitorear con UptimeRobot o curl manual desde fuera del VPS.
      - name: Verificar health post-deploy
        run: |
          set -euo pipefail
          URL="https://erp-ibiomedica.com.ar/api/health"
          for i in 1 2 3 4 5 6; do
            echo "Health check intento $i/6…"
            if resp=$(curl -sf --max-time 30 "$URL"); then
              if echo "$resp" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'; then
                echo "Health OK: $resp"
                exit 0
              fi
              echo "Respuesta inesperada: $resp"
            else
              echo "curl falló (HTTP o timeout)"
            fi
            sleep 15
          done
          echo "ERROR: health check falló tras deploy en $URL"
          exit 1
